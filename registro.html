<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse — Norte Lanas</title>
    <link rel="icon" type="image/png" href="./imgs/nortelanas_logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="./imgs/nortelanas_logo.png" alt="Norte Lanas">
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="#">Lanas</a></li>
                <li><a href="#">Tejidos</a></li>
                <li><a href="login.html">Entrar</a></li>
                <li><a href="registro.html">Registrarse</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Registro de usuario</h1>
        <form>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required>

            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required>

            <label for="fecha">Fecha de nacimiento:</label>
            <input type="date" id="fecha" name="fecha" required>

            <button type="submit">Registrarse</button>
        </form>
    </main>

    <footer>© 2025 Norte Lanas</footer>

    <script src="index.js"></script>
</body>
</html>
